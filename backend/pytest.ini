[pytest]
asyncio_mode = auto
pythonpath = .
; cache.py's Redis client is a process-wide singleton (matching real
; runtime behavior, one event loop for the app's lifetime) — sharing one
; event loop across the test session avoids orphaning that singleton's
; connection between per-function event loops.
asyncio_default_test_loop_scope = session
markers =
    integration: requires a live docker compose stack (mcp servers, Postgres, Qdrant, Redis)
