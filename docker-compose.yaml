services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    depends_on:
      - backend-api

  backend-api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      MCP_TV_URL: http://mcp-tv:9001/mcp
      MCP_PLUS_URL: http://mcp-plus:9002/mcp
      MCP_NEWS_URL: http://mcp-news:9003/mcp
      MCP_SHARED_URL: http://mcp-shared:9004/mcp
      CORE_DATABASE_URL: postgresql://${CORE_DB_USER}:${CORE_DB_PASSWORD}@postgres-core:5432/nova_core
      CORE_DATABASE_ADMIN_URL: postgresql+psycopg://${CORE_DB_USER}:${CORE_DB_PASSWORD}@postgres-core:5432/nova_core
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_LLM_MODEL: ${OPENROUTER_LLM_MODEL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      - mcp-tv
      - mcp-plus
      - mcp-news
      - mcp-shared
      - postgres-core
      - redis

  mcp-tv:
    build:
      context: ./mcp_servers
      dockerfile: tv/Dockerfile
    ports:
      - "9001:9001"
    environment:
      # Admin connection — used only by Alembic (migrations, role/grant setup)
      POSTGRES_TV_ADMIN_URL: postgresql+psycopg2://${TV_DB_USER}:${TV_DB_PASSWORD}@postgres-tv:5432/mcn_tv
      # Read-only connection — used by the SQL Analytics Tool at runtime
      POSTGRES_TV_URL: postgresql+asyncpg://mcn_tv_readonly:${TV_DB_READONLY_PASSWORD}@postgres-tv:5432/mcn_tv
      TV_DB_READONLY_PASSWORD: ${TV_DB_READONLY_PASSWORD}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: mcn_tv
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      OPENROUTER_LLM_MODEL: ${OPENROUTER_LLM_MODEL}
    depends_on:
      - postgres-tv
      - qdrant

  postgres-tv:
    image: postgres:16
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: mcn_tv
      POSTGRES_USER: ${TV_DB_USER}
      POSTGRES_PASSWORD: ${TV_DB_PASSWORD}
    volumes:
      - postgres_tv_data:/var/lib/postgresql/data

  mcp-plus:
    build:
      context: ./mcp_servers
      dockerfile: plus/Dockerfile
    ports:
      - "9002:9002"
    environment:
      POSTGRES_PLUS_ADMIN_URL: postgresql+psycopg2://${PLUS_DB_USER}:${PLUS_DB_PASSWORD}@postgres-plus:5432/mcn_plus
      POSTGRES_PLUS_URL: postgresql+asyncpg://mcn_plus_readonly:${PLUS_DB_READONLY_PASSWORD}@postgres-plus:5432/mcn_plus
      PLUS_DB_READONLY_PASSWORD: ${PLUS_DB_READONLY_PASSWORD}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: mcn_plus
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      OPENROUTER_LLM_MODEL: ${OPENROUTER_LLM_MODEL}
    depends_on:
      - postgres-plus
      - qdrant

  postgres-plus:
    image: postgres:16
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: mcn_plus
      POSTGRES_USER: ${PLUS_DB_USER}
      POSTGRES_PASSWORD: ${PLUS_DB_PASSWORD}
    volumes:
      - postgres_plus_data:/var/lib/postgresql/data

  mcp-news:
    build:
      context: ./mcp_servers
      dockerfile: news/Dockerfile
    ports:
      - "9003:9003"
    environment:
      POSTGRES_NEWS_ADMIN_URL: postgresql+psycopg2://${NEWS_DB_USER}:${NEWS_DB_PASSWORD}@postgres-news:5432/mcn_news
      POSTGRES_NEWS_URL: postgresql+asyncpg://mcn_news_readonly:${NEWS_DB_READONLY_PASSWORD}@postgres-news:5432/mcn_news
      NEWS_DB_READONLY_PASSWORD: ${NEWS_DB_READONLY_PASSWORD}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: mcn_news
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      OPENROUTER_LLM_MODEL: ${OPENROUTER_LLM_MODEL}
    depends_on:
      - postgres-news
      - qdrant

  postgres-news:
    image: postgres:16
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: mcn_news
      POSTGRES_USER: ${NEWS_DB_USER}
      POSTGRES_PASSWORD: ${NEWS_DB_PASSWORD}
    volumes:
      - postgres_news_data:/var/lib/postgresql/data

  mcp-shared:
    build:
      context: ./mcp_servers
      dockerfile: shared/Dockerfile
    ports:
      - "9004:9004"
    environment:
      TAVILY_API_KEY: ${TAVILY_API_KEY}

  postgres-core:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: nova_core
      POSTGRES_USER: ${CORE_DB_USER}
      POSTGRES_PASSWORD: ${CORE_DB_PASSWORD}
    volumes:
      - postgres_core_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  # --- Document ingestion pipeline (ADR-0007/0011/0022) ---

  minio:
    image: minio/minio:latest
    ports:
      - "9010:9000"   # S3 API
      - "9011:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      # Configures a webhook notification *target* named "INGEST" — each
      # bucket still needs a one-off `mc event add` to actually subscribe
      # to it (see worker/CLAUDE.md's setup step; not something MinIO's
      # own env vars can do for you).
      MINIO_NOTIFY_WEBHOOK_ENABLE_INGEST: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_INGEST: http://ingestion-webhook:8080/webhook
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  ingestion-webhook:
    build: ./worker
    command: uvicorn webhook:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: "false"
      QDRANT_URL: http://qdrant:6333
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      CORE_DATABASE_ADMIN_URL: postgresql+psycopg2://${CORE_DB_USER}:${CORE_DB_PASSWORD}@postgres-core:5432/nova_core
    depends_on:
      - redis
      - minio
      - postgres-core

  worker:
    build: ./worker
    command: celery -A celery_app worker --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: "false"
      QDRANT_URL: http://qdrant:6333
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      CORE_DATABASE_ADMIN_URL: postgresql+psycopg2://${CORE_DB_USER}:${CORE_DB_PASSWORD}@postgres-core:5432/nova_core
    depends_on:
      - redis
      - minio
      - postgres-core
      - qdrant

volumes:
  postgres_tv_data:
  postgres_plus_data:
  postgres_news_data:
  postgres_core_data:
  qdrant_data:
  redis_data:
  minio_data:
