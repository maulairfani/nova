services:
  frontend:
    # NEXT_PUBLIC_BACKEND_URL is NOT set here - it's a Next.js
    # NEXT_PUBLIC_* var, inlined into the client bundle at `npm run build`
    # time, not read from the container's runtime environment. It's baked
    # into the image by release.yml's build-args (DOMAIN_API secret).
    image: ghcr.io/${GHCR_OWNER}/nova-frontend:${TAG:-latest}
    depends_on:
      - backend-api

  backend-api:
    image: ghcr.io/${GHCR_OWNER}/nova-backend:${TAG:-latest}
    environment:
      MCP_TV_URL: http://mcp-tv:9001/mcp
      MCP_PLUS_URL: http://mcp-plus:9002/mcp
      MCP_NEWS_URL: http://mcp-news:9003/mcp
      MCP_SHARED_URL: http://mcp-shared:9004/mcp
      CORE_DATABASE_URL: postgresql://${CORE_DB_USER}:${CORE_DB_PASSWORD}@postgres-core:5432/nova_core
      CORE_DATABASE_ADMIN_URL: postgresql+psycopg://${CORE_DB_USER}:${CORE_DB_PASSWORD}@postgres-core:5432/nova_core
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_LLM_MODEL: ${OPENROUTER_LLM_MODEL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: '["https://${DOMAIN_FRONTEND}"]'
    depends_on:
      - mcp-tv
      - mcp-plus
      - mcp-news
      - mcp-shared
      - postgres-core
      - redis

  mcp-tv:
    image: ghcr.io/${GHCR_OWNER}/nova-mcp-tv:${TAG:-latest}
    environment:
      POSTGRES_TV_ADMIN_URL: postgresql+psycopg2://${TV_DB_USER}:${TV_DB_PASSWORD}@postgres-tv:5432/mcn_tv
      POSTGRES_TV_URL: postgresql+asyncpg://mcn_tv_readonly:${TV_DB_READONLY_PASSWORD}@postgres-tv:5432/mcn_tv
      TV_DB_READONLY_PASSWORD: ${TV_DB_READONLY_PASSWORD}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: mcn_tv
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      OPENROUTER_LLM_MODEL: ${OPENROUTER_LLM_MODEL}
    depends_on:
      - postgres-tv
      - qdrant

  postgres-tv:
    image: postgres:16
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: mcn_tv
      POSTGRES_USER: ${TV_DB_USER}
      POSTGRES_PASSWORD: ${TV_DB_PASSWORD}
    volumes:
      - postgres_tv_data:/var/lib/postgresql/data

  mcp-plus:
    image: ghcr.io/${GHCR_OWNER}/nova-mcp-plus:${TAG:-latest}
    environment:
      POSTGRES_PLUS_ADMIN_URL: postgresql+psycopg2://${PLUS_DB_USER}:${PLUS_DB_PASSWORD}@postgres-plus:5432/mcn_plus
      POSTGRES_PLUS_URL: postgresql+asyncpg://mcn_plus_readonly:${PLUS_DB_READONLY_PASSWORD}@postgres-plus:5432/mcn_plus
      PLUS_DB_READONLY_PASSWORD: ${PLUS_DB_READONLY_PASSWORD}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: mcn_plus
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      OPENROUTER_LLM_MODEL: ${OPENROUTER_LLM_MODEL}
    depends_on:
      - postgres-plus
      - qdrant

  postgres-plus:
    image: postgres:16
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: mcn_plus
      POSTGRES_USER: ${PLUS_DB_USER}
      POSTGRES_PASSWORD: ${PLUS_DB_PASSWORD}
    volumes:
      - postgres_plus_data:/var/lib/postgresql/data

  mcp-news:
    image: ghcr.io/${GHCR_OWNER}/nova-mcp-news:${TAG:-latest}
    environment:
      POSTGRES_NEWS_ADMIN_URL: postgresql+psycopg2://${NEWS_DB_USER}:${NEWS_DB_PASSWORD}@postgres-news:5432/mcn_news
      POSTGRES_NEWS_URL: postgresql+asyncpg://mcn_news_readonly:${NEWS_DB_READONLY_PASSWORD}@postgres-news:5432/mcn_news
      NEWS_DB_READONLY_PASSWORD: ${NEWS_DB_READONLY_PASSWORD}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: mcn_news
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      OPENROUTER_LLM_MODEL: ${OPENROUTER_LLM_MODEL}
    depends_on:
      - postgres-news
      - qdrant

  postgres-news:
    image: postgres:16
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: mcn_news
      POSTGRES_USER: ${NEWS_DB_USER}
      POSTGRES_PASSWORD: ${NEWS_DB_PASSWORD}
    volumes:
      - postgres_news_data:/var/lib/postgresql/data

  mcp-shared:
    image: ghcr.io/${GHCR_OWNER}/nova-mcp-shared:${TAG:-latest}
    environment:
      TAVILY_API_KEY: ${TAVILY_API_KEY}

  postgres-core:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: nova_core
      POSTGRES_USER: ${CORE_DB_USER}
      POSTGRES_PASSWORD: ${CORE_DB_PASSWORD}
    volumes:
      - postgres_core_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  # --- Document ingestion pipeline (ADR-0007/0011/0022) ---
  # Not exposed on a public host port here (unlike dev) — nothing outside
  # the VM needs direct MinIO/webhook access; only internal container
  # traffic (worker, ingestion-webhook) does.

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_NOTIFY_WEBHOOK_ENABLE_INGEST: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_INGEST: http://ingestion-webhook:8080/webhook
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  ingestion-webhook:
    image: ghcr.io/${GHCR_OWNER}/nova-worker:${TAG:-latest}
    command: uvicorn webhook:app --host 0.0.0.0 --port 8080
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: "false"
      QDRANT_URL: http://qdrant:6333
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      CORE_DATABASE_ADMIN_URL: postgresql+psycopg2://${CORE_DB_USER}:${CORE_DB_PASSWORD}@postgres-core:5432/nova_core
    depends_on:
      - redis
      - minio
      - postgres-core

  worker:
    image: ghcr.io/${GHCR_OWNER}/nova-worker:${TAG:-latest}
    command: celery -A celery_app worker --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: "false"
      QDRANT_URL: http://qdrant:6333
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      CORE_DATABASE_ADMIN_URL: postgresql+psycopg2://${CORE_DB_USER}:${CORE_DB_PASSWORD}@postgres-core:5432/nova_core
    depends_on:
      - redis
      - minio
      - postgres-core
      - qdrant

  # One-off dummy-data seed for all 3 business-unit analytics databases
  # (ADR-0025) — run via `docker compose -f docker-compose.prod.yml run
  # --rm seed-data python seed_all.py` after a deploy that migrated a
  # schema change (e.g. ADR-0023's dimensional schema), same manual
  # first-time-per-change step as local dev. Not started by `up -d`.
  seed-data:
    image: ghcr.io/${GHCR_OWNER}/nova-seed-data:${TAG:-latest}
    environment:
      POSTGRES_TV_ADMIN_URL: postgresql+psycopg2://${TV_DB_USER}:${TV_DB_PASSWORD}@postgres-tv:5432/mcn_tv
      POSTGRES_PLUS_ADMIN_URL: postgresql+psycopg2://${PLUS_DB_USER}:${PLUS_DB_PASSWORD}@postgres-plus:5432/mcn_plus
      POSTGRES_NEWS_ADMIN_URL: postgresql+psycopg2://${NEWS_DB_USER}:${NEWS_DB_PASSWORD}@postgres-news:5432/mcn_news
    profiles:
      - tools

  caddy:
    image: caddy:2-alpine
    ports:
      # NPM (already running on this VM for other services) owns 80/443
      # and TLS — Caddy is reachable on this alternate port only, as an
      # internal HTTP router NPM forwards to. See ADR-0019, ADR-0020, and
      # Caddyfile. Port 8081 (not 8080) because another service on the VM
      # already binds 127.0.0.1:8080.
      - "8081:80"
    environment:
      DOMAIN_FRONTEND: ${DOMAIN_FRONTEND}
      DOMAIN_API: ${DOMAIN_API}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend-api

volumes:
  postgres_tv_data:
  postgres_plus_data:
  postgres_news_data:
  postgres_core_data:
  qdrant_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
