name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service: mcp-tv
            context: ./mcp_servers
            dockerfile: ./mcp_servers/tv/Dockerfile
          - service: mcp-plus
            context: ./mcp_servers
            dockerfile: ./mcp_servers/plus/Dockerfile
          - service: mcp-news
            context: ./mcp_servers
            dockerfile: ./mcp_servers/news/Dockerfile
          - service: mcp-shared
            context: ./mcp_servers
            dockerfile: ./mcp_servers/shared/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push nova-${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/nova-${{ matrix.service }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/nova-${{ matrix.service }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Copy compose/proxy config to the VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "infrastructure/docker-compose.prod.yml,infrastructure/Caddyfile"
          target: ${{ secrets.VM_DEPLOY_PATH }}
          strip_components: 1
      - name: Pull new images, migrate, restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ${{ secrets.VM_DEPLOY_PATH }}
            export TAG=${{ github.ref_name }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm mcp-tv alembic upgrade head
            docker compose -f docker-compose.prod.yml run --rm mcp-plus alembic upgrade head
            docker compose -f docker-compose.prod.yml run --rm mcp-news alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d
