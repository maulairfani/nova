name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service: mcp-tv
            context: ./mcp_servers
            dockerfile: ./mcp_servers/tv/Dockerfile
          - service: mcp-plus
            context: ./mcp_servers
            dockerfile: ./mcp_servers/plus/Dockerfile
          - service: mcp-news
            context: ./mcp_servers
            dockerfile: ./mcp_servers/news/Dockerfile
          - service: mcp-shared
            context: ./mcp_servers
            dockerfile: ./mcp_servers/shared/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push nova-${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_BACKEND_URL=https://{0}', secrets.DOMAIN_API) || '' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/nova-${{ matrix.service }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/nova-${{ matrix.service }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Copy compose/proxy config to the VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "infrastructure/docker-compose.prod.yml,infrastructure/Caddyfile"
          target: ${{ secrets.VM_DEPLOY_PATH }}
          strip_components: 1
      - name: Pull new images, migrate, restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ${{ secrets.VM_DEPLOY_PATH }}
            export TAG=${{ github.ref_name }}
            docker compose -f docker-compose.prod.yml pull

            # Bring up the Postgres instances first and wait for them to
            # actually accept connections before migrating — on a first
            # deploy (fresh volumes) `docker compose run` would otherwise
            # implicitly start Postgres via depends_on and immediately try
            # to connect before it's ready ("the database system is
            # starting up"), a race that doesn't show up once the volumes
            # already have data (subsequent deploys start faster).
            docker compose -f docker-compose.prod.yml up -d postgres-tv postgres-plus postgres-news postgres-nova-kb qdrant redis
            for svc in postgres-tv postgres-plus postgres-news postgres-nova-kb; do
              for i in $(seq 1 30); do
                if docker compose -f docker-compose.prod.yml exec -T "$svc" pg_isready > /dev/null 2>&1; then
                  echo "$svc is ready"
                  break
                fi
                echo "waiting for $svc... ($i/30)"
                sleep 2
              done
            done

            docker compose -f docker-compose.prod.yml run --rm mcp-tv alembic upgrade head
            docker compose -f docker-compose.prod.yml run --rm mcp-plus alembic upgrade head
            docker compose -f docker-compose.prod.yml run --rm mcp-news alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d
